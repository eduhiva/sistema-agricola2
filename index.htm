<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Agrícola</title>

<style>
body { font-family: Arial; margin:0; background:#f3f4f6;}
.login-container { width:360px; margin:100px auto; background:white; padding:24px; border-radius:12px; }
input { width:100%; padding:10px; margin:6px 0; }
button { padding:10px; background:#166534; color:white; border:none; cursor:pointer; }
.dashboard { display:none; }
.layout { display:flex; }
.sidebar { width:220px; background:#14532d; color:white; padding:10px; }
.content { flex:1; padding:20px; }
.person-item { background:white; margin-bottom:10px; padding:10px; cursor:pointer; }
.person-item:hover { background:#dcfce7; }
</style>
</head>

<body>

<div id="loginView" class="login-container">
<h2>Login Sistema Agrícola</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
<div id="mensaje"></div>
</div>

<div id="dashboardView" class="dashboard">
<div class="layout">

<div class="sidebar">
<button onclick="mostrarAgricultores()">Agricultores</button>
<button onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<div class="content" id="contenido"></div>

</div>
</div>

<script>

let agricultores = [
{ id:1, nombre:"Juan Pérez", rut:"1-9", comuna:"Puerto Varas" },
{ id:2, nombre:"María González", rut:"2-7", comuna:"Llanquihue" }
];

let listaActual = [...agricultores];

function login(){
let u = user.value;
let p = pass.value;

if(u=="admin" && p=="1234"){
loginView.style.display="none";
dashboardView.style.display="block";
mostrarAgricultores();
}else{
mensaje.innerText="Datos incorrectos";
}
}

function cerrarSesion(){
dashboardView.style.display="none";
loginView.style.display="block";
}

function mostrarAgricultores(){

contenido.innerHTML = `
<h2>Agricultores</h2>

<input id="busqueda" placeholder="Buscar nombre, rut o comuna">

<button onclick="buscar()">Buscar</button>
<button onclick="mostrarTodos()">Mostrar todos</button>
<button onclick="crear()">Crear agricultor</button>

<div id="lista"></div>
`;

renderLista(listaActual);
}

function renderLista(lista){
let html="";
lista.forEach(a=>{
html+=`
<div class="person-item">
<b>${a.nombre}</b><br>
${a.rut} - ${a.comuna}
</div>
`;
});
lista.innerHTML = html;
document.getElementById("lista").innerHTML = html;
}

function buscar(){
let texto = document.getElementById("busqueda").value.toLowerCase();

listaActual = agricultores.filter(a =>
a.nombre.toLowerCase().includes(texto) ||
a.rut.toLowerCase().includes(texto) ||
a.comuna.toLowerCase().includes(texto)
);

renderLista(listaActual);
}

function mostrarTodos(){
listaActual = [...agricultores];
renderLista(listaActual);
}

function crear(){
let nombre = prompt("Nombre");
let rut = prompt("RUT");
let comuna = prompt("Comuna");

if(nombre){
agricultores.push({ id:Date.now(), nombre, rut, comuna });
mostrarTodos();
}
}

</script>

</body>
</html>
